{% extends 'userbase.html' %}
{% block body %}
<!-- Carousel Start -->
   <div class="container-fluid p-0 pb-5 mb-5">
    <div id="header-carousel" class="carousel slide carousel-fade" data-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active" style="min-height: 300px;">
                <img class="position-relative w-100" src="static/img/img7.jpg" style="min-height: 300px; object-fit: cover;">
                <div class="carousel-caption d-flex align-items-center justify-content-center">
                    <div class="p-5" style="width: 100%; max-width: 900px;">
                        <h1 class="display-3 text-white mb-md-4">What is a stroke?</h1>
                        <h5 class="text-white text-uppercase mb-md-3">An ischemic stroke occurs when the blood supply to part 
                            of the brain is interrupted or reduced, preventing brain tissue from getting oxygen and nutrients. 
                            Brain cells begin to die in minutes.
                        </h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Carousel End -->
{% endblock %}
