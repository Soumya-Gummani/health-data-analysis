{% extends 'base.html' %}
{% block body %}
<!-- Registration Start -->
<div class="container-fluid bg-registration py-5" style="margin: 90px 0;">
    <div class="container py-5">
        <div class="row align-items-center">
            <div class="col-lg-5">
                <div class="card border-0">
                    <div class="card-header bg-light text-center p-4">
                        <h1 class="m-0">User Login</h1>
                    </div>
                    <div class="card-body rounded-bottom bg-primary p-5">
                        {% if msg %}
                            <div class="alert alert-danger text-center">{{ msg }}</div>
                        {% endif %}
                        <form method="POST" action="{{ url_for('userloginNext') }}">
                            <div class="form-group">
                                <input type="email" name="username" class="form-control border-0 p-4" placeholder="Your Email" required />
                            </div>
                            <div class="form-group">
                                <input type="password" name="upassword" class="form-control border-0 p-4" placeholder="Password" required />
                            </div>
                            <div>
                                <button class="btn btn-dark btn-block border-0 py-3" type="submit">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Registration End -->
{% endblock %}
