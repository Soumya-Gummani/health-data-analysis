{% extends 'base.html' %}
{% block body %}
   
    <!-- Contact Start -->
    <div class="container-fluid py-5">
        <div class="container py-5">
            <div class="text-center mb-5">
                <h5 class="text-primary text-uppercase mb-3" style="letter-spacing: 5px;">Sign Up</h5>
                <h1></h1>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="contact-form bg-secondary rounded p-5">
                        <div id="success"></div>
                        <form name="sentMessage"  novalidate="novalidate"  action="/signup" method="POST" >
                            <div class="control-group">
                                <input type="text" class="form-control border-0 p-4" name="uname" placeholder="Your Name" required="required" data-validation-required-message="Please enter your name" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="control-group">
                                <input type="text" class="form-control border-0 p-4"  name="uphone" placeholder="Phone" required="required" data-validation-required-message="Please enter a phone number" />
                                <p class="help-block text-danger"></p>
                            </div>

                            <div class="control-group">
                                <input type="email" class="form-control border-0 p-4" name="username"  placeholder="Your Email" required="required" data-validation-required-message="Please enter your email" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="control-group">
                                <input type="text" class="form-control border-0 p-4" name="upassword"  placeholder="Password" required="required" data-validation-required-message="Please enter a password" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="text-center">
                                <button class="btn btn-primary py-3 px-5" type="submit" id="sendMessageButton">Sign Up</button>
                            </div>
                        </form>
<br><br>
                        <center><div class="section-title" >
                            {% if msg %}
                           <h4 style="color:rgb(24, 20, 20)">  {{msg}} </h4>
                            {% endif %}
                      </div>
                    </center> 
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Contact End -->

{% endblock %}
